<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA | Qidiruv</title>
    <meta name="description" content="NEXA qidiruv sahifasi: foydalanuvchilar, hashtaglar va postlarni toping.">
    <link rel="icon" type="image/png" sizes="500x500" href="/media/logo.png">
    <link rel="apple-touch-icon" href="/media/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
  </head>
  <body data-page="search">
    <div class="app-shell">
      <header class="topbar glass-panel">
        <a class="brand" href="/">
          <span class="brand-mark"><img src="/media/logo.png" alt="NEXA logo"></span>
          <span class="brand-copy">
            <span>NEXA</span>
            <small>Qidiruv</small>
          </span>
        </a>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <main class="page-wrap">
        <section class="hero-card">
          <span class="eyebrow"><i class="fa-solid fa-magnifying-glass"></i> Aqlli qidiruv</span>
          <h1 class="display-title" style="font-size:2.6rem;">Postlar va profillarni bir joyda toping</h1>
          <p class="page-subline">Kalit so'z, hashtag yoki username kiriting. Natijalar Uzbek kontentga mos ko'rinishda chiqadi.</p>
          <form class="hero-actions mt-3" id="searchPageForm">
            <div class="search-shell">
              <i class="fa-solid fa-hashtag"></i>
              <input class="search-input" id="searchPageInput" type="search" name="q" placeholder="Masalan: toshkent, coffee, aziza">
            </div>
            <button class="primary-btn" type="submit">
              <i class="fa-solid fa-compass"></i>
              <span>Topish</span>
            </button>
          </form>
        </section>

        <section id="searchPageSummary"></section>
        <section id="searchPageUsers"></section>
        <section class="feed-stack" id="searchPagePosts"></section>
      </main>
    </div>

    <nav class="mobile-nav glass-panel" id="mobileNav"></nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
