<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA | Chat</title>
    <meta name="description" content="NEXA real time chat: foydalanuvchilar bilan jonli yozishmalar.">
    <link rel="icon" type="image/png" sizes="500x500" href="/media/logo.png">
    <link rel="apple-touch-icon" href="/media/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
  </head>
  <body data-page="chat">
    <div class="app-shell">
      <header class="topbar glass-panel">
        <a class="brand" href="/">
          <span class="brand-mark"><img src="/media/logo.png" alt="NEXA logo"></span>
          <span class="brand-copy">
            <span>NEXA</span>
            <small>Jonli chat</small>
          </span>
        </a>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <main class="page-wrap">
        <section class="hero-card">
          <span class="eyebrow"><i class="fa-regular fa-paper-plane"></i> Real time chat</span>
          <h1 class="display-title" style="font-size:2.6rem;">Tez, silliq va jonli yozishmalar</h1>
          <p class="page-subline">Profilingizdan yoki shu yerning o'zidan yangi suhbat boshlang.</p>
        </section>

        <section class="chat-layout">
          <aside class="profile-card chat-sidebar">
            <div class="section-title">
              <h2>Suhbatlar</h2>
            </div>
            <form id="chatUserSearchForm" class="form-stack mt-0">
              <div class="search-shell">
                <i class="fa-solid fa-user-plus"></i>
                <input class="search-input" id="chatUserSearchInput" type="search" placeholder="Yangi chat uchun username qidiring">
              </div>
              <button class="ghost-link" type="submit">Foydalanuvchini topish</button>
            </form>
            <div class="search-profile-list mt-3" id="chatUserSearchResults"></div>
            <div class="chat-room-list mt-3" id="chatRoomsList"></div>
          </aside>

          <section class="profile-card chat-main">
            <div id="chatHeader" class="chat-header"></div>
            <div id="chatEmptyState" class="empty-state">Suhbatni tanlang yoki yangi foydalanuvchi qidiring.</div>
            <div id="chatMessages" class="chat-messages"></div>
            <form id="chatForm" class="chat-composer d-none">
              <textarea class="form-control" id="chatInput" rows="2" placeholder="Xabar yozing..."></textarea>
              <button class="primary-btn" type="submit">
                <i class="fa-solid fa-paper-plane"></i>
                <span>Yuborish</span>
              </button>
            </form>
          </section>
        </section>
      </main>
    </div>

    <nav class="mobile-nav glass-panel" id="mobileNav"></nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
