<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA | Kirish</title>
    <meta name="description" content="NEXA hisobingizga kiring va zamonaviy foto jamiyatiga qo‘shiling.">
    <link rel="icon" type="image/png" sizes="500x500" href="/media/logo.png">
    <link rel="apple-touch-icon" href="/media/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
  </head>
  <body data-page="login">
    <main class="auth-shell">
      <section class="auth-card glass-panel">
        <a class="brand" href="/">
          <span class="brand-mark"><img src="/media/logo.png" alt="NEXA logo"></span>
          <span class="brand-copy">
            <span>NEXA</span>
            <small>Qaytganingizdan xursandmiz</small>
          </span>
        </a>
        <h1 class="display-title">Kirish</h1>
        <p class="page-subline">Layk, izoh va tavsiyalarni davom ettirish uchun hisobingizga kiring.</p>
        <form id="loginForm" class="form-stack">
          <div>
            <label class="field-label">Email yoki username</label>
            <input class="form-control" type="text" name="identifier" placeholder="siz@pochta.uz yoki username" required>
          </div>
          <div>
            <label class="field-label">Parol</label>
            <input class="form-control" type="password" name="password" placeholder="Parolingiz" required>
          </div>
          <button class="primary-btn" type="submit">Kirish</button>
        </form>
        <div class="auth-foot">
          Hisobingiz yo‘qmi? <a href="/register.html">Ro'yxatdan o'ting</a>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
