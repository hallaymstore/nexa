<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA | Ro'yxatdan o'tish</title>
    <meta name="description" content="NEXA’da yangi hisob yarating va foto postlaringizni SEO-friendly tarzda ulashing.">
    <link rel="icon" type="image/png" sizes="500x500" href="/media/logo.png">
    <link rel="apple-touch-icon" href="/media/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
  </head>
  <body data-page="register">
    <main class="auth-shell">
      <section class="auth-card glass-panel">
        <a class="brand" href="/">
          <span class="brand-mark"><img src="/media/logo.png" alt="NEXA logo"></span>
          <span class="brand-copy">
            <span>NEXA</span>
            <small>Jamiyatga qo‘shiling</small>
          </span>
        </a>
        <h1 class="display-title">Ro'yxatdan o'tish</h1>
        <p class="page-subline">Uzbek foto platformasida ilhomli postlar va real engagement uchun hisob yarating.</p>
        <form id="registerForm" class="form-stack">
          <div>
            <label class="field-label">To'liq ism</label>
            <input class="form-control" type="text" name="fullName" placeholder="Ism Familiya" required>
          </div>
          <div>
            <label class="field-label">Username</label>
            <input class="form-control" type="text" name="username" placeholder="username" required>
          </div>
          <div>
            <label class="field-label">Email</label>
            <input class="form-control" type="email" name="email" placeholder="siz@pochta.uz" required>
          </div>
          <div>
            <label class="field-label">Parol</label>
            <input class="form-control" type="password" name="password" placeholder="Kamida 6 belgi" required>
          </div>
          <button class="primary-btn" type="submit">Hisob yaratish</button>
        </form>
        <div class="auth-foot">
          Hisobingiz bormi? <a href="/login.html">Kirish</a>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
