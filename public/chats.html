<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA | Chatlar</title>
    <meta name="description" content="NEXA chatlar sahifasi: foydalanuvchilarni toping va suhbatni chat.html oynasida davom ettiring.">
    <link rel="icon" type="image/png" sizes="500x500" href="/media/logo.png">
    <link rel="apple-touch-icon" href="/media/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
  </head>
  <body data-page="chats">
    <div class="app-shell">
      <header class="topbar glass-panel">
        <a class="brand" href="/">
          <span class="brand-mark"><img src="/media/logo.png" alt="NEXA logo"></span>
          <span class="brand-copy">
            <span>NEXA</span>
            <small>Chatlar</small>
          </span>
        </a>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <main class="page-wrap">
        <section class="hero-card">
          <span class="eyebrow"><i class="fa-regular fa-comments"></i> Chatlar</span>
          <h1 class="display-title" style="font-size:2.6rem;">Suhbatni tanlang yoki yangisini boshlang</h1>
          <p class="page-subline">Bir foydalanuvchini bosganingizda suhbat `chat.html` sahifasida ochiladi.</p>
        </section>

        <section class="chat-layout chat-directory-layout">
          <aside class="profile-card chat-sidebar">
            <div class="section-title">
              <h2>Suhbatlar ro'yxati</h2>
            </div>
            <form id="chatUserSearchForm" class="form-stack mt-0">
              <div class="search-shell">
                <i class="fa-solid fa-user-plus"></i>
                <input class="search-input" id="chatUserSearchInput" type="search" placeholder="Username yoki ism orqali qidiring">
              </div>
              <button class="ghost-link" type="submit">Foydalanuvchini topish</button>
            </form>
            <div class="search-profile-list mt-3" id="chatUserSearchResults"></div>
            <div class="chat-room-list mt-3" id="chatRoomsList"></div>
          </aside>

          <section class="panel-card desktop-only">
            <div class="section-title">
              <h3>Media xabarlar</h3>
            </div>
            <p class="page-subline">Oddiy rasm suhbatda doimiy ko'rinadi. Sirli rasm esa faqat bir marta 10 soniyaga ochiladi.</p>
            <div class="stack-actions mt-4">
              <a class="ghost-link" href="/create.html"><i class="fa-solid fa-camera"></i> Post yaratish</a>
              <a class="ghost-link" href="/search.html"><i class="fa-solid fa-magnifying-glass"></i> Profil qidirish</a>
            </div>
          </section>
        </section>
      </main>
    </div>

    <nav class="mobile-nav glass-panel" id="mobileNav"></nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
