<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXA | Yaratish</title>
    <meta name="description" content="NEXA’da 1 dan 5 tagacha rasm bilan yangi post yarating.">
    <link rel="icon" type="image/png" sizes="500x500" href="/media/logo.png">
    <link rel="apple-touch-icon" href="/media/logo.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" rel="stylesheet">
    <link href="/assets/style.css" rel="stylesheet">
  </head>
  <body data-page="create">
    <div class="app-shell">
      <header class="topbar glass-panel">
        <a class="brand" href="/">
          <span class="brand-mark"><img src="/media/logo.png" alt="NEXA logo"></span>
          <span class="brand-copy">
            <span>NEXA</span>
            <small>Yangi post</small>
          </span>
        </a>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <main class="page-wrap">
        <section class="create-card">
          <span class="eyebrow"><i class="fa-solid fa-sparkles"></i> Yaratish</span>
          <h1 class="display-title" style="font-size:2.4rem;">1 dan 5 tagacha rasmdan iborat post joylang</h1>
          <p class="page-subline">Har bir rasm maksimal 5MB. Caption va hashtaglar bilan postingizni yanada jozibali qiling.</p>
        </section>

        <section class="create-card">
          <form id="createForm" class="form-stack">
            <div>
              <label class="field-label">Rasmlar</label>
              <label class="uploader-drop">
                <div>
                  <div class="brand-mark mx-auto mb-3"><i class="fa-solid fa-images"></i></div>
                  <div class="author-name">Rasmlarni tanlang yoki bu yerga bosing</div>
                  <div class="helper-text mt-2" id="createHelper">1-5 ta rasm, har biri 5MB gacha</div>
                </div>
                <input id="imagesInput" type="file" accept="image/*" multiple>
              </label>
              <div class="preview-grid" id="previewGrid"></div>
            </div>
            <div>
              <label class="field-label">Caption</label>
              <textarea class="form-control" name="caption" maxlength="1200" placeholder="Post haqida qisqa va chiroyli yozing..."></textarea>
            </div>
            <div>
              <label class="field-label">Hashtaglar</label>
              <input class="form-control" type="text" name="tags" placeholder="#toshkent #foto #sayohat">
              <div class="helper-text mt-2">Vergul yoki bo‘sh joy bilan ajrating.</div>
            </div>
            <button class="primary-btn" type="submit">
              <i class="fa-solid fa-paper-plane"></i>
              <span>Post joylash</span>
            </button>
          </form>
        </section>
      </main>
    </div>

    <nav class="mobile-nav glass-panel" id="mobileNav"></nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
